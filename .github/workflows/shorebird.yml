name: Mobile Shorebird

# Ships updates via Shorebird code-push.
#   - Every push to master that touches app code -> an OTA *patch* (the common
#     loop; installed apps self-update, no reinstall).
#   - Run manually (Actions -> Mobile Shorebird -> Run workflow) and pick
#     `release` for a version bump / native change (new plugin, Android config,
#     Flutter upgrade) — that produces a fresh installable APK artifact.
#
# Requires repo secret SHOREBIRD_TOKEN (Shorebird Console -> Account -> API Keys,
# "Release & Patch only" scope). Optional repo variable AFFLUENA_API_BASE_URL
# (defaults to the VPS URL below) — baked in at build time so the app reaches the
# API instead of falling back to localhost.

on:
  push:
    branches: [master]
    paths:
      - 'lib/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'shorebird.yaml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'patch = OTA update (Dart-only); release = new installable build'
        type: choice
        options: [patch, release]
        default: patch

permissions:
  contents: read

concurrency:
  group: mobile-shorebird
  cancel-in-progress: false

jobs:
  shorebird:
    name: Shorebird ${{ inputs.mode || 'patch' }}
    runs-on: ubuntu-latest
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
      API_URL: ${{ vars.AFFLUENA_API_BASE_URL || 'http://43.133.147.101/api/v1' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      # OTA patch — pushes to master, and the "patch" manual option.
      - name: Shorebird patch (OTA)
        if: ${{ github.event_name == 'push' || inputs.mode == 'patch' }}
        uses: shorebirdtech/shorebird-patch@v1
        with:
          platform: android
          release-version: latest
          # Flutter flags go after `--` (proxied to flutter build).
          # --no-tree-shake-icons must match the release so the icon font asset
          # stays byte-identical (else the patch fails with "asset changes").
          args: --dart-define=AFFLUENA_API_BASE_URL=${{ env.API_URL }} -- --no-tree-shake-icons

      # Full release — manual only (version bump / native change). Patches use
      # the release's Flutter version, so this pins the project's 3.44.2.
      - name: Shorebird release (new installable build)
        if: ${{ inputs.mode == 'release' }}
        uses: shorebirdtech/shorebird-release@v1
        with:
          platform: android
          flutter-version: 3.44.2
          # Bundle the full Material Icons font (flutter flag, after `--`) so
          # future icon changes stay patchable over the air (see patch step).
          args: --artifact=apk --dart-define=AFFLUENA_API_BASE_URL=${{ env.API_URL }} -- --no-tree-shake-icons

      - name: Upload release APK
        if: ${{ inputs.mode == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: affluena-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

  notify:
    name: Notify Telegram
    needs:
      - shorebird
    if: always() && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SHOREBIRD_RESULT: ${{ needs.shorebird.result }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Send Telegram notification
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping notification."
            exit 0
          fi

          status="SUCCESS"
          title="Affluena Mobile Shorebird selesai"
          if [ "$SHOREBIRD_RESULT" != "success" ]; then
            status="FAILED"
            title="Affluena Mobile Shorebird gagal"
          fi

          short_sha="${GITHUB_SHA::7}"
          message="$(printf '[%s] %s\nRepository: %s\nBranch: %s\nCommit: %s\nShorebird: %s\nRun: %s\n' \
            "$status" "$title" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$short_sha" "$SHOREBIRD_RESULT" "$RUN_URL")"

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${message}"
